<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <header>
        <nav>
            <button id="rules-button">RULES</button>
        </nav>
    </header>

    
    <h1>SKELETON SHOWDOWN</h1>

    <h3>CHOOSE YOUR MOVE</h3>

    <section id="button-section">
        <div id="button-container">
            <button id="rock">
                <img src="images/rock-img.jpg" alt="Skeleton hand doing a rock hand sign">
            </button>

            <button id="paper">
                <img src="images/paper-img.jpg" alt="Skeleton hand doing a paper hand sign">
            </button>

            <button id="scissors">
                <img src="images/scissors-img.jpg" alt="Skeleton hand doing a scissors hand sign">
            </button>
        </div>
    </section>


    <h2 id="round-winner"></h2>

    <section id="score-section">
        <h2 id="human-score"></h2>
        <h2 id="comp-score"></h2>
    </section>

    <!--Game winner & restart game-->
    <div id="game-over-modal" class="hidden">
    <div class="modal-content">
        <img id="modal-image" src="" alt="Game over image">
        <h2 id="overall-winner"></h2>
        <button id="restart">RESTART</button>
    </div>
    </div>
    


    <!-- <section id="restart-section">
        <button id="restart">RESTART</button>
    </section> -->
    

    <script src="main.js"></script>
</body>
</html>
