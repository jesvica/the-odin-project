<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <button id="rock">
        <img src="images/rock-img.jpg" alt="Skeleton hand doing a rock hand sign">
    </button>

    <button id="paper">
        <img src="images/paper-img.jpg" alt="Skeleton hand doing a paper hand sign">
    </button>

    <button id="scissors">
        <img src="images/scissors-img.jpg" alt="Skeleton hand doing a scissors hand sign">
    </button>


    <h2 id="round-winner"></h2>
    <h2 id="score"></h2>
    <h2 id="overall-winner"></h2>

    <button id="restart">Restart game</button>

    <script src="main.js"></script>
</body>
</html>
