<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function add7(num) {
            return num + 7;
        }
        console.log(add7(7))

        function multiply(a,b) {
            return a * b;
        }

        console.log(multiply(2,4))

        function capitalize(string) {
            string = string.toLowerCase().charAt(0).toUpperCase() + string.slice(1).toLowerCase();
            return string;
        }

        console.log(capitalize('hELLO'));


    </script>
</body>
</html>
